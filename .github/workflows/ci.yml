name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '16'

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Install dependencies and build the
  #         React production bundle. Runs on every
  #         push and pull request to main.
  # ─────────────────────────────────────────────
  build:
    name: Build React App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # CI=false prevents react-scripts from treating
      # ESLint/Sass warnings as errors (matches Docker build behaviour)
      - name: Build production bundle
        run: npm run build
        env:
          CI: false

      # Upload build/ so the release job can publish it
      # can download the pre-built artifact without rebuilding
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-build-${{ github.sha }}
          path: build/
          retention-days: 7

  # ─────────────────────────────────────────────
  # Job 2: Create a GitHub Release with the built
  #         React artifact. Only runs on pushes to main
  #         (skipped for pull requests).
  # ─────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Download the pre-built React bundle
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: react-build-${{ github.sha }}
          path: build/

      - name: Create release archive
        run: tar -czf shopizer-react-build.tar.gz -C build .

      - name: Set release metadata
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "tag=build-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "name=Build ${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: shopizer-react-build.tar.gz
