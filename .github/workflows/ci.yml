name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '16'
  IMAGE_NAME: shopizer-shop-reactjs

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Install dependencies and build the
  #         React production bundle. Runs on every
  #         push and pull request to main.
  # ─────────────────────────────────────────────
  build:
    name: Build React App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # CI=false prevents react-scripts from treating
      # ESLint/Sass warnings as errors (matches Docker build behaviour)
      - name: Build production bundle
        run: npm run build
        env:
          CI: false

      # Upload build/ so the docker job (and any future deploy job)
      # can download the pre-built artifact without rebuilding
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-build-${{ github.sha }}
          path: build/
          retention-days: 7

  # ─────────────────────────────────────────────
  # Job 2: Build the Docker image and push it to
  #         Docker Hub. Only runs on pushes to main
  #         (skipped for pull requests).
  # ─────────────────────────────────────────────
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Download the pre-built React bundle so the Docker
      # build can copy it directly instead of rebuilding
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: react-build-${{ github.sha }}
          path: build/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      # Produces two tags:
      #   latest          → always points to the newest main build
      #   sha-<short-sha> → immutable reference for rollback / tracing
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer cache backed by GitHub Actions cache
          # → subsequent builds are significantly faster
          cache-from: type=gha
          cache-to: type=gha,mode=max
